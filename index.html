<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPN Neon</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#050014;
    color:white;
}

.container {
    max-width:900px;
    margin:auto;
    padding:30px;
}

.card {
    background:rgba(20,20,40,.8);
    border:1px solid #00ffff;
    border-radius:20px;
    padding:30px;
    box-shadow:
    0 0 10px #00ffff,
    0 0 30px #8a2be2;
    text-align:center;
}

h1 {
    font-size:45px;
    color:#00ffff;
    text-shadow:
    0 0 10px #00ffff,
    0 0 30px #00ffff;
}

h2 {
    color:#ff00ff;
    text-shadow:0 0 15px #ff00ff;
}

p {
    color:#ddd;
    font-size:18px;
}

.btn {
    display:inline-block;
    margin:10px;
    padding:15px 35px;
    border-radius:50px;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#00ffff,#ff00ff);
    box-shadow:0 0 20px #ff00ff;
    font-weight:bold;
}

.btn:hover {
    transform:scale(1.05);
}

.server {
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.box {
    background:#0d0920;
    padding:20px;
    border-radius:15px;
    border:1px solid #8a2be2;
    box-shadow:0 0 15px #8a2be2;
}

.status {
    color:#00ff99;
    font-weight:bold;
}

footer {
    margin-top:30px;
    text-align:center;
    color:#888;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>⚡ NEON VPN ⚡</h1>

<h2>Premium Secure Network</h2>

<p>
高速 VPN dengan koneksi stabil,
server global dan keamanan terenkripsi.
</p>


<a class="btn" href="#">
DOWNLOAD APK
</a>

<a class="btn" href="#">
JOIN CHANNEL
</a>


<div class="server">

<div class="box">
<h3>🇸🇬 Singapore</h3>
<p class="status">● ONLINE</p>
<p>Ping: 20ms</p>
</div>


<div class="box">
<h3>🇯🇵 Japan</h3>
<p class="status">● ONLINE</p>
<p>Ping: 50ms</p>
</div>


<div class="box">
<h3>🇺🇸 USA</h3>
<p class="status">● ONLINE</p>
<p>Ping: 120ms</p>
</div>

</div>


</div>

<footer>
© 2026 Neon VPN
</footer>

</div>

</body>
</html>
